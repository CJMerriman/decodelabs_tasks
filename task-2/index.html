<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecodeLabs Task 2 - Performance Analytics</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-card">
        <div class="card-header">
            <div>
                <span class="meta-text">System Metrics</span>
                <h2>Application Performance</h2>
            </div>
            <span class="status-indicator live">Live Monitor</span>
        </div>
        
        <div class="metrics-grid">
            <div class="metric-item">
                <span class="label">API Response Time</span>
                <span class="value">124ms</span>
                <span class="trend positive">↓ 12% vs last hour</span>
            </div>
            <div class="metric-item">
                <span class="label">Memory Utilization</span>
                <span class="value">42.8%</span>
                <span class="trend stable">Optimal</span>
            </div>
        </div>

        <div class="progress-section">
            <div class="progress-labels">
                <span>Monthly Server Budget</span>
                <span>84% Used</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill"></div>
            </div>
        </div>
    </div>
</body>
</html>
