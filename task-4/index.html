<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecodeLabs Task 4 - Real-Time Interface</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="ticker-panel">
        <div class="panel-header">
            <h3>Market Watch</h3>
            <span class="badge-pulse">System Active</span>
        </div>
        
        <div class="ticker-list">
            <div class="ticker-row">
                <div class="asset-meta">
                    <span class="symbol">BTC</span>
                    <span class="fullname">Bitcoin</span>
                </div>
                <div class="asset-pricing">
                    <span class="price">$67,420.50</span>
                    <span class="change negative">-2.4%</span>
                </div>
            </div>
            <div class="ticker-row">
                <div class="asset-meta">
                    <span class="symbol">ETH</span>
                    <span class="fullname">Ethereum</span>
                </div>
                <div class="asset-pricing">
                    <span class="price">$3,510.25</span>
                    <span class="change positive">+5.8%</span>
                </div>
            </div>
            <div class="ticker-row">
                <div class="asset-meta">
                    <span class="symbol">SOL</span>
                    <span class="fullname">Solana</span>
                </div>
                <div class="asset-pricing">
                    <span class="price">$142.80</span>
                    <span class="change positive">+12.4%</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
